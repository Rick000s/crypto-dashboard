<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crypto</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-10">
    <nav class="flex justify-between items-center border-b border-gray-700 pb-5">
        <h1 class="text-2xl font-bold">CryptoDash</h1>
        <div class="space-x-4">
            <button id="btn-market" class="text-blue-400">Market</button>
            <button id="btn-portfolio">Portfolio</button>
        </div>
    </nav>

    <main class="p-10">
        <section id="market-view">
            <h2 class="text-2xl font-bold mb-5">Crypto Market</h2>

            <div id="crypto-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <p class="text-gray-500">Loading prices...</p>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
    </body>
</html>
